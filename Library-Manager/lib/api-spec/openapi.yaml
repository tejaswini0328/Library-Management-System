openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Library Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: books
    description: Book management
  - name: movies
    description: Movie management
  - name: memberships
    description: Membership management
  - name: transactions
    description: Transaction management
  - name: reports
    description: Reports and analytics
  - name: users
    description: User management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all books
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

    post:
      operationId: createBook
      tags: [books]
      summary: Create a new book
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

    put:
      operationId: updateBook
      tags: [books]
      summary: Update a book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /movies:
    get:
      operationId: listMovies
      tags: [movies]
      summary: List all movies
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: genre
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"

    post:
      operationId: createMovie
      tags: [movies]
      summary: Create a new movie
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMovieBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

  /movies/{id}:
    get:
      operationId: getMovie
      tags: [movies]
      summary: Get a movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movie details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

    put:
      operationId: updateMovie
      tags: [movies]
      summary: Update a movie
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMovieBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

    delete:
      operationId: deleteMovie
      tags: [movies]
      summary: Delete a movie
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /memberships:
    get:
      operationId: listMemberships
      tags: [memberships]
      summary: List all memberships
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, expired, suspended]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipListResponse"

    post:
      operationId: createMembership
      tags: [memberships]
      summary: Create a membership
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMembershipBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  /memberships/{id}:
    get:
      operationId: getMembership
      tags: [memberships]
      summary: Get a membership
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Membership details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

    put:
      operationId: updateMembership
      tags: [memberships]
      summary: Update a membership
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMembershipBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

    delete:
      operationId: deleteMembership
      tags: [memberships]
      summary: Delete a membership
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, issued, returned, overdue]
        - name: userId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Issue a book or movie
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/return:
    post:
      operationId: returnItem
      tags: [transactions]
      summary: Return a book or movie
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/pay-fine:
    post:
      operationId: payFine
      tags: [transactions]
      summary: Pay the fine for an overdue item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fine paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/approve:
    post:
      operationId: approveTransaction
      tags: [transactions]
      summary: Approve a pending issue request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get dashboard summary stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummary"

  /reports/active-issues:
    get:
      operationId: getActiveIssues
      tags: [reports]
      summary: Get all active issues
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /reports/overdue:
    get:
      operationId: getOverdueReturns
      tags: [reports]
      summary: Get overdue returns
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Overdue returns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /reports/pending-requests:
    get:
      operationId: getPendingRequests
      tags: [reports]
      summary: Get pending issue requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, user]
      required:
        - email
        - password

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, user]
          default: user
      required:
        - name
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        category:
          type: string
        description:
          type: string
        totalCopies:
          type: integer
        availableCopies:
          type: integer
        publishedYear:
          type: integer
        status:
          type: string
          enum: [available, issued, unavailable]
        coverUrl:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - author
        - category
        - totalCopies
        - availableCopies
        - status

    CreateBookBody:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        category:
          type: string
        description:
          type: string
        totalCopies:
          type: integer
        publishedYear:
          type: integer
        coverUrl:
          type: string
      required:
        - title
        - author
        - category
        - totalCopies

    BookListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        director:
          type: string
        genre:
          type: string
        description:
          type: string
        duration:
          type: integer
        releaseYear:
          type: integer
        totalCopies:
          type: integer
        availableCopies:
          type: integer
        status:
          type: string
          enum: [available, issued, unavailable]
        posterUrl:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - director
        - genre
        - totalCopies
        - availableCopies
        - status

    CreateMovieBody:
      type: object
      properties:
        title:
          type: string
        director:
          type: string
        genre:
          type: string
        description:
          type: string
        duration:
          type: integer
        releaseYear:
          type: integer
        totalCopies:
          type: integer
        posterUrl:
          type: string
      required:
        - title
        - director
        - genre
        - totalCopies

    MovieListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    Membership:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userEmail:
          type: string
        membershipType:
          type: string
          enum: [basic, premium, student]
        status:
          type: string
          enum: [active, expired, suspended]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        maxBooks:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - membershipType
        - status
        - startDate
        - endDate
        - maxBooks

    CreateMembershipBody:
      type: object
      properties:
        userId:
          type: integer
        membershipType:
          type: string
          enum: [basic, premium, student]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
      required:
        - userId
        - membershipType
        - startDate
        - endDate

    MembershipListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    Transaction:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        itemType:
          type: string
          enum: [book, movie]
        itemId:
          type: integer
        itemTitle:
          type: string
        itemAuthor:
          type: string
        status:
          type: string
          enum: [pending, issued, returned, overdue]
        issueDate:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
        returnDate:
          type: string
          format: date-time
        fineAmount:
          type: number
        finePaid:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - itemType
        - itemId
        - itemTitle
        - status
        - dueDate

    CreateTransactionBody:
      type: object
      properties:
        itemType:
          type: string
          enum: [book, movie]
        itemId:
          type: integer
        userId:
          type: integer
        daysToReturn:
          type: integer
          default: 14
      required:
        - itemType
        - itemId

    TransactionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    ReportSummary:
      type: object
      properties:
        totalBooks:
          type: integer
        totalMovies:
          type: integer
        totalUsers:
          type: integer
        totalMembers:
          type: integer
        activeIssues:
          type: integer
        overdueCount:
          type: integer
        pendingRequests:
          type: integer
        totalFinesCollected:
          type: number
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required:
        - totalBooks
        - totalMovies
        - totalUsers
        - totalMembers
        - activeIssues
        - overdueCount
        - pendingRequests
        - totalFinesCollected
        - recentTransactions
